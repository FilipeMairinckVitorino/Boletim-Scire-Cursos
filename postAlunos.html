<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançar Aluno</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="shortcut icon" href="IMG/favicon.svg" type="image/x-icon">
</head>
<body>
    <header>
        <img src="IMG/header.svg" alt="" id="forma">
        <img src="IMG/Scire Logo.svg" alt="Scire" id="logo">
    </header>
    <main>
        <section class="digitaCampos">
            <section class="id">
                <span class="id">Id</span>
                <input type="number" class="postInputs" id="postId">
            </section>
            <section class="nome">
                <span class="nome">Nome</span>
                <input type="text" class="postInputs" id="postNome">
            </section>
            <section class="turma">
                <span class="turma">Turma</span>
                <input type="text" class="postInputs" id="postTurma">
            </section>
        </section>
        <button type="submit" id="novoAluno" class="post">Lançar</button>
    </main>
    <footer>
        <a href="index.html">Boletim</a>
        <a href="postNotas.html">Notas</a>
        <div class="autor">
            <span class="autor">Created by Filipe Mairinck Vitorino</span>
        </div>
    </footer>

<script type="module" src="Script/API.js"></script>
<script type="module" src="Script/scriptPostAlunos.js"></script>
<script type="module" src="Script/exportFunctions.js"></script>
<script src="Script/header.js"></script>
</body>
</html>
